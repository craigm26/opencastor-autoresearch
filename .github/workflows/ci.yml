name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install ruff
      - name: Lint
        run: ruff check run_agent.py || true   # advisory only — model code is exploratory

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax check
        run: python3 -m py_compile run_agent.py && echo "Syntax OK"
      - name: Verify program.md exists
        run: test -f program.md && echo "program.md OK"
      - name: Verify cron.sh is executable
        run: test -x cron.sh && echo "cron.sh OK"
